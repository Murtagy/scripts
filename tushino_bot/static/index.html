<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Слоты Тушино</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; background: #17212b; color: #f5f5f5; }
    .wrap { padding: 16px; max-width: 820px; margin: 0 auto; }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    .slot-btn, button { border: 0; border-radius: 10px; padding: 10px 14px; background: #2b5278; color: white; cursor: pointer; }
    .slot-btn.active { background: #5288c1; }
    .card { background: #1f2c3a; border-radius: 14px; padding: 12px; margin-top: 12px; }
    .muted { color: #a3b3c3; }
    .item-header { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .score { margin: 6px 0 0 0; padding-left: 18px; }
    .danger { background: #8a2d2d; }
    .secondary { background: #3a4f66; }
    input { width: 100%; box-sizing: border-box; border-radius: 10px; border: 0; padding: 12px; margin-top: 10px; background: #243447; color: white; }
    .topbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .hidden { display: none; }
    .pill { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #243447; font-size: 12px; }
    .msg { margin-top: 10px; color: #ffd166; min-height: 1.2em; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h2 style="margin:0">Слоты Тушино</h2>
      <button id="refreshBtn" class="secondary">Обновить</button>
    </div>
    <div class="muted" id="weekLabel">Загрузка...</div>
    <div class="row" id="slotTabs" style="margin-top:12px"></div>

    <div class="card">
      <div><b>Добавить слот</b></div>
      <input id="itemName" placeholder="BTR-70, Пилот, Медик..." />
      <div class="row" style="margin-top:10px">
        <button id="addBtn">Добавить</button>
      </div>
      <div class="msg" id="msg"></div>
    </div>

    <div id="slotView"></div>

    <div class="card">
      <div class="topbar">
        <div><b>Журнал действий</b></div>
        <button id="logsBtn" class="secondary">Обновить журнал</button>
      </div>
      <div id="logsView" class="muted" style="margin-top:10px">Загрузка...</div>
    </div>
  </div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

let state = { week: null, activeSlot: 'пт1' };

function msg(text) {
  document.getElementById('msg').textContent = text || '';
}

async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'X-Telegram-Init-Data': tg.initData || '',
      ...(options.headers || {}),
    },
  });
  if (!res.ok) {
    let detail = 'Ошибка запроса';
    try {
      const body = await res.json();
      detail = body.detail || detail;
    } catch (_) {}
    throw new Error(detail);
  }
  return res.json();
}

function escapeHtml(str) {
  return String(str)
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;');
}

function renderTabs() {
  const tabs = document.getElementById('slotTabs');
  tabs.innerHTML = '';
  for (const slot of state.week.slots) {
    const btn = document.createElement('button');
    btn.className = 'slot-btn' + (slot.code === state.activeSlot ? ' active' : '');
    btn.textContent = `${slot.code} (${slot.items.length})`;
    btn.onclick = () => {
      state.activeSlot = slot.code;
      render();
    };
    tabs.appendChild(btn);
  }
}

function statusLabel(status) {
  return ({ open: 'открыт', called: 'завершен', tiebreak: 'переброс' }[status] || status);
}

function scoreList(item) {
  if (!item.scores.length) return '<div class="muted">Пока нет бросков</div>';
  const rows = item.scores.map((s, idx) => {
    const name = escapeHtml(s.display_name || s.username);
    const winner = item.status === 'called' && idx === 0 ? ' ✅' : '';
    const tiebreak = s.tiebreak_value != null ? ` (tb ${s.tiebreak_value})` : '';
    return `<li>${name} — <b>${s.best_value}</b>${tiebreak}${winner}</li>`;
  }).join('');
  return `<ol class="score">${rows}</ol>`;
}

function itemCard(item) {
  const tieText = item.status === 'tiebreak' && item.tied_display_names.length
    ? `<div class="muted">Переброс между: ${item.tied_display_names.map(escapeHtml).join(', ')}</div>`
    : '';
  return `
    <div class="card">
      <div class="item-header">
        <div>
          <div><b>${escapeHtml(item.name)}</b></div>
          <div class="muted">статус: ${statusLabel(item.status)} · раунд ${item.round_no}</div>
        </div>
        <div class="row">
          <button onclick="rollItem(${item.id})">Бросок</button>
          <button class="secondary" onclick="undoRoll(${item.id})">Отменить бросок</button>
          <button class="secondary" onclick="callItem(${item.id})">Подвести итог</button>
          <button class="secondary" onclick="reopenItem(${item.id})">Переоткрыть</button>
          <button class="danger" onclick="deleteItem(${item.id})">Удалить</button>
        </div>
      </div>
      ${tieText}
      ${scoreList(item)}
    </div>
  `;
}

function formatLogLine(row) {
  const who = escapeHtml(row.display_name || row.username || 'system');
  const target = [row.slot_code, row.item_name].filter(Boolean).join('/');
  const actionMap = {
    add_item: 'создал слот',
    delete_item: 'удалил слот',
    roll: 'сделал бросок',
    undo_roll: 'отменил бросок',
    call_tiebreak: 'запустил переброс',
    call_winner: 'подвел итог',
    reopen_item: 'переоткрыл розыгрыш',
    week_init: 'обновил неделю',
    week_reset: 'пересоздал неделю',
    tunnel_restart: 'перезапустил tunnel',
    warning_repeat_roll: '🚨 ВНИМАНИЕ! сделал повторный бросок',
  };
  const action = actionMap[row.action] || row.action;
  return `${escapeHtml(row.created_at)} — ${who} ${escapeHtml(action)}${target ? ' ' + escapeHtml(target) : ''}`;
}

function renderLogs(logs) {
  const view = document.getElementById('logsView');
  if (!logs.length) {
    view.innerHTML = 'Лог пуст';
    return;
  }
  view.innerHTML = logs.map(x => `<div>${formatLogLine(x)}</div>`).join('');
}

function render() {
  document.getElementById('weekLabel').textContent = `Неделя ${state.week.week_key}`;
  renderTabs();
  const slot = state.week.slots.find(x => x.code === state.activeSlot) || state.week.slots[0];
  const view = document.getElementById('slotView');
  if (!slot || !slot.items.length) {
    view.innerHTML = '<div class="card"><div class="muted">Пока нет айтемов</div></div>';
    return;
  }
  view.innerHTML = slot.items.map(itemCard).join('');
}

async function reloadWeek() {
  const [week, logs] = await Promise.all([
    api('/api/week/active'),
    api('/api/logs?limit=30'),
  ]);
  state.week = week;
  if (!state.week.slots.find(x => x.code === state.activeSlot) && state.week.slots.length) {
    state.activeSlot = state.week.slots[0].code;
  }
  render();
  renderLogs(logs.logs || []);
}

async function addItem() {
  const input = document.getElementById('itemName');
  const name = input.value.trim();
  if (!name) return;
  try {
    await api(`/api/slots/${encodeURIComponent(state.activeSlot)}/items`, {
      method: 'POST',
      body: JSON.stringify({ name }),
    });
    input.value = '';
    msg('Слот добавлен');
    await reloadWeek();
  } catch (e) {
    msg(e.message);
  }
}

async function rollItem(itemId) {
  try {
    const item = await api(`/api/items/${itemId}/roll`, { method: 'POST' });
    msg(`Бросок ${item.last_roll.value} за ${item.name}`);
    await reloadWeek();
  } catch (e) {
    msg(e.message);
  }
}

async function undoRoll(itemId) {
  try {
    await api(`/api/items/${itemId}/undo_roll`, { method: 'POST' });
    msg('Бросок отменен');
    await reloadWeek();
  } catch (e) {
    msg(e.message);
  }
}

async function callItem(itemId) {
  try {
    const item = await api(`/api/items/${itemId}/call`, { method: 'POST' });
    msg(item.call_result === 'tiebreak' ? 'Ничья. Нужен переброс.' : (item.manual_call ? 'Слот помечен как занятый.' : 'Победитель определен.'));
    await reloadWeek();
  } catch (e) {
    msg(e.message);
  }
}

async function reopenItem(itemId) {
  try {
    await api(`/api/items/${itemId}/reopen`, { method: 'POST' });
    msg('Розыгрыш переоткрыт');
    await reloadWeek();
  } catch (e) {
    msg(e.message);
  }
}

async function deleteItem(itemId) {
  if (!window.confirm('Уверен, что хочешь удалить слот?')) return;
  try {
    await api(`/api/items/${itemId}`, { method: 'DELETE' });
    msg('Слот удален');
    await reloadWeek();
  } catch (e) {
    msg(e.message);
  }
}

document.getElementById('refreshBtn').onclick = () => reloadWeek().catch(e => msg(e.message));
document.getElementById('logsBtn').onclick = () => reloadWeek().catch(e => msg(e.message));
document.getElementById('addBtn').onclick = () => addItem();
document.getElementById('itemName').addEventListener('keydown', e => {
  if (e.key === 'Enter') addItem();
});

reloadWeek().catch(e => msg(e.message));
window.rollItem = rollItem;
window.undoRoll = undoRoll;
window.callItem = callItem;
window.reopenItem = reopenItem;
window.deleteItem = deleteItem;
</script>
</body>
</html>
